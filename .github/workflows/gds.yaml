name: gds

on:
  push:
  workflow_dispatch:

jobs:
  gds:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build GDS
        uses: TinyTapeout/tt-gds-action@ttihp26a
        with:
          pdk: ihp-sg13g2
          librelane-version: 3.0.0.dev44

  precheck:
    needs: gds
    runs-on: ubuntu-24.04
    steps:
      - name: Run Tiny Tapeout Precheck
        uses: TinyTapeout/tt-gds-action/precheck@ttihp26a

  gl_test:
    needs: gds
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: GL test
        uses: TinyTapeout/tt-gds-action/gl_test@ttihp26a

  viewer:
    needs: gds
    runs-on: ubuntu-24.04
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source
    steps:
      - name: GitHub Pages setup reminder
        if: ${{ !github.event.repository.has_pages }}
        shell: bash
        run: |
          echo "GitHub Pages is not enabled for this repository." >> "$GITHUB_STEP_SUMMARY"
          echo "Enable it in Settings > Pages, then rerun this workflow to publish the GDS viewer." >> "$GITHUB_STEP_SUMMARY"

      - name: Publish GDS viewer
        if: ${{ github.event.repository.has_pages }}
        uses: TinyTapeout/tt-gds-action/viewer@ttihp26a
